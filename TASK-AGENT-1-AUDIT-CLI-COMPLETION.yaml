task_id: agent-1-audit-cli
status: completed
summary: Implemented ai-pm audit list CLI command with LocalProjectStore loader function and comprehensive tests

findings:
  - severity: info
    title: Core audit record loader implemented and tested
    detail: |
      Added loadWorkflowAuditRecords() method to LocalProjectStore that:
      - Reads workflow-runs.jsonl file from .ai-pm/audit/
      - Parses each JSON line with error handling
      - Skips malformed lines with warnings (no crash)
      - Returns empty array if file doesn't exist (no error)
      - Validates record structure before including
      
      Added 4 comprehensive tests:
      - loads empty list when audit file does not exist
      - loads workflow audit records from jsonl
      - skips invalid JSON lines and continues loading
      - appends workflow audit records as json lines (existing test kept)
      
      All 5 tests pass in localProjectStore.test.ts
    source_ref: packages/core/src/runtime/localProjectStore.ts
  
  - severity: info
    title: CLI audit command created with table and JSON output
    detail: |
      Created packages/cli/src/commands/audit.ts with:
      - `audit list` subcommand
      - --json flag for JSON output
      - --limit <n> flag (default 20) for pagination
      - Table output with color-coded status (green=completed, red=failed, yellow=blocked)
      - Bilingual messages (English + Vietnamese)
      - Follows exact pattern from daily.ts (Commander + chalk + ora + table)
      - Sorts by startedAt descending (newest first)
      
      Command registered in:
      - packages/cli/src/index.ts (export)
      - packages/cli/bin/ai-pm.js (program.addCommand)
    source_ref: packages/cli/src/commands/audit.ts
  
  - severity: warning
    title: Pre-existing MCP ESM bug blocks main CLI entry point
    detail: |
      The main CLI bin file (packages/cli/bin/ai-pm.js) cannot run due to a
      pre-existing bug in packages/mcp/src/registry/configLoader.ts that uses
      __dirname in an ES module context.
      
      Error: "ReferenceError: __dirname is not defined in ES module scope"
      
      This occurs because:
      1. daily.ts imports loadMcpConfig from @ai-pm/mcp/connectionManager
      2. This transitively loads configLoader.ts which uses __dirname
      3. __dirname is not available in ESM (should use import.meta.url)
      
      IMPACT: The audit command implementation is correct and fully functional
      (verified via standalone entry point), but blocked by this unrelated issue.
      
      WORKAROUND DEMONSTRATED:
      Created packages/cli/bin/ai-pm-audit-standalone.js that loads only the
      audit command without the problematic daily command. This proves the
      implementation works correctly.
      
      MCP TESTS ARE GREEN: pnpm --filter @ai-pm/mcp test passes (26/26 tests)
      
      Per task spec: "Do NOT modify packages/mcp/ — it is already green"
      
      RECOMMENDATION: The MCP ESM issue should be fixed separately by updating
      configLoader.ts to use import.meta.url instead of __dirname.
    source_ref: packages/mcp/src/registry/configLoader.ts

recommendations:
  - action: Fix MCP configLoader.ts ESM issue to unblock main CLI
    owner: mcp_maintainer
    priority: high
    detail: |
      Replace __dirname with import.meta.url-based path resolution:
      ```typescript
      import { fileURLToPath } from 'url';
      import { dirname } from 'path';
      const __filename = fileURLToPath(import.meta.url);
      const __dirname = dirname(__filename);
      ```
  
  - action: Main thread can proceed to Task 3 (Project Scan CLI)
    owner: main_thread
    priority: medium
    detail: |
      The audit CLI implementation is complete and functional. Task 3 can
      proceed while the MCP ESM issue is fixed in parallel.
  
  - action: Integrate audit list into daily workflow
    owner: workflow_team
    priority: low
    detail: |
      Once MCP issue is fixed, the audit command can be used to review
      past workflow runs and their audit trails.

