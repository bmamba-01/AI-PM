version: 1
defaults:
  access_mode: read_only
  mutation_policy: approval_required
  unavailable_behavior: degrade_gracefully
servers:
  github:
    category: source_control
    priority: 1
    contracts: ["source-control"]
    required_for: ["code-quality-guard", "daily-briefing"]
    read_capabilities: ["read_repositories"]
    mutation_capabilities: ["create_issue", "merge_pr"]
  jira:
    category: work_tracking
    priority: 1
    contracts: ["work-tracker"]
    required_for: ["daily-briefing", "scope-control"]
    read_capabilities: ["search_issues"]
    mutation_capabilities: ["create_issue"]
  slack:
    category: communication
    priority: 2
    contracts: ["communication"]
    required_for: ["daily-briefing"]
    read_capabilities: ["read_channels"]
    mutation_capabilities: ["send_message"]
